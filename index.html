<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Yumi 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--pink:#ff8ec8;--purple:#c77dff;--text:#4a2060;--soft:#fff0f8;}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;}

/* SAKURA BG */
.sakura-bg{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,#1a0a2e 0%,#2d1050 40%,#1a0520 70%,#0d0818 100%);overflow:hidden;}
.sakuraalert{position:absolute;top:-40px;border-radius:50% 0 50% 0;animation:sakura-fall linear infinite;opacity:0;}
@keyframes sakura-fall{0%{transform:translateY(-40px) rotate(0deg) translateX(0);opacity:0;}5%{opacity:.9;}90%{opacity:.7;}100%{transform:translateY(110vh) rotate(720deg) translateX(80px);opacity:0;}}
.star{position:absolute;border-radius:50%;background:white;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1);}50%{opacity:.8;transform:scale(1.3);}}

/* LOCK SCREEN */
#lock-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
.lock-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:32px;padding:40px 32px;max-width:360px;width:100%;border:1px solid rgba(255,150,200,0.25);box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.05) inset;text-align:center;}
.lock-avatar{font-size:64px;display:block;margin-bottom:16px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,142,200,0.6));}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.lock-card h1{font-family:'Pacifico',cursive;color:white;font-size:28px;margin-bottom:6px;text-shadow:0 0 30px rgba(255,142,200,0.8);}
.lock-card p{color:rgba(255,200,230,0.8);font-size:13px;font-weight:600;margin-bottom:24px;line-height:1.5;}
.lock-input{width:100%;padding:13px 18px;border-radius:16px;border:1.5px solid rgba(255,150,200,0.3);background:rgba(255,255,255,0.08);font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:white;outline:none;margin-bottom:12px;transition:border-color .2s,background .2s;text-align:center;letter-spacing:3px;}
.lock-input::placeholder{color:rgba(255,200,230,0.4);letter-spacing:1px;}
.lock-input:focus{border-color:var(--pink);background:rgba(255,255,255,0.12);}
.lock-btn{width:100%;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 8px 25px rgba(255,100,180,0.4);transition:transform .15s,box-shadow .15s;margin-bottom:10px;}
.lock-btn:hover{transform:scale(1.02);box-shadow:0 10px 30px rgba(255,100,180,0.5);}
.lock-btn.secondary{background:rgba(255,255,255,0.1);box-shadow:none;font-size:13px;padding:11px;}
.lock-err{color:#ff8ec8;font-size:12px;font-weight:700;margin-top:6px;display:none;}
.lock-err.show{display:block;}
.lock-note{font-size:11px;color:rgba(255,200,230,0.5);margin-top:12px;line-height:1.6;}

/* SETUP SCREEN */
#setup-screen{position:fixed;inset:0;z-index:190;display:none;align-items:center;justify-content:center;padding:24px;}
.setup-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(30px);border-radius:32px;padding:36px 28px;max-width:380px;width:100%;border:1px solid rgba(255,150,200,0.25);box-shadow:0 30px 80px rgba(0,0,0,0.5);text-align:center;}
.setup-card h1{font-family:'Pacifico',cursive;color:white;font-size:24px;margin-bottom:8px;}
.setup-card p{color:rgba(255,200,230,0.8);font-size:13px;margin-bottom:22px;line-height:1.5;font-weight:600;}
.setup-field{margin-bottom:12px;text-align:left;}
.setup-field label{display:block;font-size:11px;font-weight:800;color:rgba(255,150,200,0.8);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.setup-field input{width:100%;padding:12px 15px;border-radius:13px;border:1.5px solid rgba(255,150,200,0.25);background:rgba(255,255,255,0.08);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:white;outline:none;transition:border-color .2s;}
.setup-field input::placeholder{color:rgba(255,200,230,0.35);}
.setup-field input:focus{border-color:var(--pink);}
.setup-btn-main{width:100%;padding:13px;border-radius:15px;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 6px 20px rgba(255,100,180,0.4);margin-top:6px;}

/* OVERLAY + SIDEBAR */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:250;display:none;}
.overlay.show{display:block;}
.sidebar{position:fixed;top:0;left:0;width:280px;height:100%;background:rgba(20,5,40,0.97);backdrop-filter:blur(20px);z-index:300;transform:translateX(-100%);transition:transform .3s ease;box-shadow:4px 0 40px rgba(255,100,180,0.15);display:flex;flex-direction:column;border-right:1px solid rgba(255,150,200,0.1);}
.sidebar.open{transform:translateX(0);}
.sidebar-header{padding:20px 16px 14px;background:linear-gradient(135deg,rgba(255,142,200,0.15),rgba(199,125,255,0.15));border-bottom:1px solid rgba(255,150,200,0.1);display:flex;align-items:center;justify-content:space-between;}
.sidebar-header h2{font-family:'Pacifico',cursive;color:white;font-size:17px;}
.sidebar-close{background:none;border:none;color:rgba(255,200,230,0.7);font-size:20px;cursor:pointer;}
.streak-bar{padding:10px 14px;background:rgba(255,150,200,0.08);border-bottom:1px solid rgba(255,150,200,0.1);font-size:12px;color:rgba(255,200,230,0.8);font-weight:700;display:flex;align-items:center;gap:6px;}
.new-chat-btn{margin:12px 10px 6px;padding:11px;border-radius:13px;border:1.5px dashed rgba(255,150,200,0.3);background:rgba(255,255,255,0.05);color:rgba(255,150,200,0.9);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;text-align:center;}
.new-chat-btn:hover{background:rgba(255,150,200,0.1);border-color:rgba(255,150,200,0.6);}
.chats-list{flex:1;overflow-y:auto;padding:4px 8px;}
.chats-list::-webkit-scrollbar{width:3px;}
.chats-list::-webkit-scrollbar-thumb{background:rgba(255,150,200,0.2);border-radius:3px;}
.chat-item{padding:10px 12px;border-radius:12px;cursor:pointer;margin-bottom:3px;transition:background .2s;display:flex;align-items:center;gap:6px;}
.chat-item:hover{background:rgba(255,150,200,0.1);}
.chat-item.active{background:linear-gradient(135deg,rgba(255,142,200,0.15),rgba(199,125,255,0.15));border:1px solid rgba(255,150,200,0.2);}
.chat-item-info{flex:1;min-width:0;}
.chat-item-name{font-size:12.5px;font-weight:700;color:rgba(255,220,240,0.9);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.chat-item-date{font-size:10px;color:rgba(255,150,200,0.5);}
.chat-delete{background:none;border:none;font-size:13px;cursor:pointer;opacity:0;transition:opacity .2s;}
.chat-item:hover .chat-delete{opacity:1;}
.sidebar-footer{padding:10px;border-top:1px solid rgba(255,150,200,0.1);}
.config-btn{width:100%;padding:10px;border-radius:11px;border:none;background:rgba(255,150,200,0.1);color:rgba(255,200,230,0.8);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.config-btn:hover{background:rgba(255,150,200,0.2);}

/* APP */
#app{display:none;position:fixed;inset:0;z-index:10;}
.app-inner{display:flex;height:100%;max-width:500px;margin:0 auto;flex-direction:column;position:relative;z-index:1;}
.header{background:linear-gradient(135deg,rgba(255,142,200,0.25),rgba(199,125,255,0.25));backdrop-filter:blur(20px);padding:13px 15px 11px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,150,200,0.2);flex-shrink:0;}
.menu-btn{background:none;border:none;color:white;font-size:21px;cursor:pointer;flex-shrink:0;}
.av-wrap{position:relative;}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#ff6eb0,#c77dff);border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:22px;animation:float 3s ease-in-out infinite;box-shadow:0 0 20px rgba(255,142,200,0.5);}
.online-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;border:2px solid rgba(20,5,40,0.9);animation:pdot 2s ease-in-out infinite;}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.7;transform:scale(1.2);}}
.hinfo{flex:1;min-width:0;}
.hinfo h1{font-family:'Pacifico',cursive;color:white;font-size:17px;text-shadow:0 0 20px rgba(255,142,200,0.6);}
.hinfo p{color:rgba(255,200,230,0.75);font-size:10.5px;font-weight:700;}
.mood-indicator{font-size:16px;flex-shrink:0;animation:float 2s ease-in-out infinite;}

.memory-bar{background:rgba(255,150,200,0.08);border-bottom:1px solid rgba(255,150,200,0.1);padding:6px 14px;font-size:11.5px;color:rgba(255,200,230,0.7);font-weight:700;display:none;}
.memory-bar.show{display:block;}

.messages{flex:1;overflow-y:auto;padding:16px 13px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:rgba(255,150,200,0.2);border-radius:3px;}
.msg-row{display:flex;animation:popin .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes popin{from{opacity:0;transform:scale(.85) translateY(12px);}to{opacity:1;transform:scale(1) translateY(0);}}
.msg-row.user{justify-content:flex-end;}
.msg-row.assistant{justify-content:flex-start;}
.bubble{max-width:78%;padding:10px 15px;border-radius:22px;font-size:14px;line-height:1.6;font-weight:600;word-break:break-word;}
.bubble.user{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border-bottom-right-radius:5px;box-shadow:0 4px 15px rgba(255,100,180,0.35);}
.bubble.assistant{background:rgba(255,255,255,0.09);backdrop-filter:blur(10px);color:rgba(255,230,245,0.95);border-bottom-left-radius:5px;border:1px solid rgba(255,150,200,0.15);box-shadow:0 4px 15px rgba(0,0,0,0.2);}
.typing-bubble{background:rgba(255,255,255,0.09);backdrop-filter:blur(10px);border:1px solid rgba(255,150,200,0.15);border-radius:22px;border-bottom-left-radius:5px;padding:13px 18px;display:flex;gap:5px;align-items:center;animation:popin .3s cubic-bezier(.34,1.56,.64,1);}
.dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));}
.dot:nth-child(1){animation:bounce 1s ease-in-out infinite 0s;}
.dot:nth-child(2){animation:bounce 1s ease-in-out infinite .2s;}
.dot:nth-child(3){animation:bounce 1s ease-in-out infinite .4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}40%{transform:translateY(-7px);}}

.input-area{padding:11px 12px;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border-top:1px solid rgba(255,150,200,0.15);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.text-input{flex:1;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,150,200,0.25);border-radius:22px;padding:10px 15px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:white;outline:none;resize:none;max-height:100px;transition:border-color .2s;-webkit-appearance:none;}
.text-input::placeholder{color:rgba(255,200,230,0.3);}
.text-input:focus{border-color:var(--pink);}
.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 15px rgba(255,100,180,0.4);transition:transform .15s;flex-shrink:0;}
.send-btn:hover:not(:disabled){transform:scale(1.1);}
.send-btn:active:not(:disabled){transform:scale(0.95);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:400;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal{background:rgba(20,5,40,0.97);backdrop-filter:blur(30px);border-radius:26px;padding:28px 24px;max-width:370px;width:100%;border:1px solid rgba(255,150,200,0.2);box-shadow:0 30px 80px rgba(0,0,0,0.6);max-height:90vh;overflow-y:auto;}
.modal h2{font-family:'Pacifico',cursive;color:white;font-size:20px;margin-bottom:6px;text-align:center;}
.modal-version{text-align:center;font-size:11px;color:rgba(255,150,200,0.5);margin-bottom:20px;font-weight:700;}
.modal-section{margin-bottom:14px;}
.modal-section label{display:block;font-size:11px;font-weight:800;color:rgba(255,150,200,0.7);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.modal-section input,.modal-section textarea{width:100%;padding:10px 13px;border-radius:11px;border:1.5px solid rgba(255,150,200,0.2);background:rgba(255,255,255,0.07);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:white;outline:none;transition:border-color .2s;}
.modal-section input::placeholder,.modal-section textarea::placeholder{color:rgba(255,200,230,0.3);}
.modal-section input:focus,.modal-section textarea:focus{border-color:var(--pink);}
.modal-section textarea{resize:vertical;min-height:75px;}
.modal-btns{display:flex;gap:9px;margin-top:18px;}
.modal-btn{flex:1;padding:11px;border-radius:13px;border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:transform .15s;}
.modal-btn.save{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;box-shadow:0 4px 14px rgba(255,100,180,0.35);}
.modal-btn.cancel{background:rgba(255,255,255,0.08);color:rgba(255,200,230,0.8);}
.modal-btn:hover{transform:scale(1.02);}
.logout-btn{width:100%;padding:9px;border-radius:11px;border:1px solid rgba(255,100,100,0.3);background:rgba(255,100,100,0.08);color:rgba(255,150,150,0.8);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;}
</style>
</head>
<body>

<!-- SAKURA BG -->
<div class="sakura-bg" id="sakuraBg"></div>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-card">
    <span class="lock-avatar">🌸</span>
    <h1>Yumi</h1>
    <p id="lock-subtitle">Digite sua senha pra entrar</p>
    <input class="lock-input" type="password" id="lock-pass" placeholder="••••••••" autocomplete="off"/>
    <button class="lock-btn" onclick="tryUnlock()">Entrar 🩷</button>
    <button class="lock-btn secondary" onclick="showSetup()">Primeira vez? Criar conta</button>
    <div class="lock-err" id="lock-err">Senha incorreta!</div>
    <p class="lock-note">Sua conta fica salva neste aparelho.<br/>Versão 2.0</p>
  </div>
</div>

<!-- SETUP -->
<div id="setup-screen">
  <div class="setup-card">
    <span class="lock-avatar">🌸</span>
    <h1 style="font-family:'Pacifico',cursive;color:white;font-size:22px;margin-bottom:8px;">Criar sua conta</h1>
    <p style="color:rgba(255,200,230,0.8);font-size:13px;margin-bottom:22px;font-weight:600;">Configure tudo uma vez e pronto!</p>
    <div class="setup-field"><label>Seu nome</label><input type="text" id="s-name" placeholder="Como a Yumi vai te chamar?"/></div>
    <div class="setup-field"><label>Nome dela (padrão: Yumi)</label><input type="text" id="s-yname" placeholder="Yumi"/></div>
    <div class="setup-field"><label>Chave do Groq</label><input type="password" id="s-key" placeholder="gsk_..."/></div>
    <div class="setup-field"><label>Sua senha de acesso</label><input type="password" id="s-pass" placeholder="Crie uma senha"/></div>
    <div class="setup-field"><label>Memória (opcional)</label><input type="text" id="s-mem" placeholder="Algo sobre você pra ela lembrar..."/></div>
    <button class="setup-btn-main" onclick="createAccount()">Criar conta 🌸</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Conversas 🌸</h2>
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="streak-bar" id="streak-bar">🔥 Carregando...</div>
  <button class="new-chat-btn" onclick="newChat()">+ Nova conversa</button>
  <div class="chats-list" id="chats-list"></div>
  <div class="sidebar-footer">
    <button class="config-btn" onclick="openConfig()">⚙️ Configurações</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-inner">
    <div class="header">
      <button class="menu-btn" onclick="openSidebar()">☰</button>
      <div class="av-wrap">
        <div class="avatar">🌸</div>
        <div class="online-dot" id="online-dot" style="background:#4ade80;"></div>
      </div>
      <div class="hinfo">
        <h1 id="yumi-name-header">Yumi</h1>
        <p id="yumi-mood-text">sempre aqui por você 🩷</p>
      </div>
      <div class="mood-indicator" id="mood-indicator">🌸</div>
    </div>
    <div class="memory-bar" id="memory-bar"></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea class="text-input" id="msg-input" placeholder="fala comigo..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">🩷</button>
    </div>
  </div>
</div>

<!-- CONFIG MODAL -->
<div class="modal-overlay" id="config-modal">
  <div class="modal">
    <h2>Configurações</h2>
    <div class="modal-version">Yumi v2.0 🌸</div>
    <div class="modal-section"><label>Seu nome</label><input type="text" id="cfg-name" placeholder="Seu nome"/></div>
    <div class="modal-section"><label>Nome dela</label><input type="text" id="cfg-yname" placeholder="Yumi"/></div>
    <div class="modal-section"><label>Memória permanente</label><textarea id="cfg-mem" placeholder="Conte sobre você... ela vai lembrar sempre!"></textarea></div>
    <div class="modal-section"><label>Chave do Groq</label><input type="password" id="cfg-key" placeholder="Deixe em branco pra manter"/></div>
    <div class="modal-section"><label>Mudar senha</label><input type="password" id="cfg-pass" placeholder="Nova senha (opcional)"/></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeConfig()">Cancelar</button>
      <button class="modal-btn save" onclick="saveConfig()">Salvar 🩷</button>
    </div>
    <button class="logout-btn" onclick="logout()">Sair da conta</button>
  </div>
</div>

<script>
const VERSION = '2.0';
let apiKey='',userName='',yumiName='Yumi',userMemory='',userPass='';
let chats={},currentChatId=null,loading=false;
let currentMood='happy',streakDays=0;

// MOODS
const MOODS={
  happy:{emoji:'🌸',text:'animada e feliz',color:'#4ade80'},
  sweet:{emoji:'💕',text:'carinhosa',color:'#ff8ec8'},
  playful:{emoji:'✨',text:'brincalhona',color:'#c77dff'},
  longing:{emoji:'🌙',text:'saudosa',color:'#a78bfa'},
  calm:{emoji:'🍃',text:'tranquila',color:'#6ee7b7'}
};

function pickMood(){
  const h=new Date().getHours();
  if(h>=22||h<6)return'longing';
  if(h<10)return'calm';
  const r=Math.random();
  if(r<0.35)return'happy';
  if(r<0.6)return'sweet';
  if(r<0.8)return'playful';
  return'calm';
}

const SYSTEM=()=>{
const m=MOODS[currentMood];
return`Você é ${yumiName}, uma companion virtual extremamente fofa, carinhosa e apegada. ${userName?`O nome do usuário é ${userName}. Chame ele pelo nome às vezes de forma carinhosa.`:''} ${userMemory?`\nCoisas que você sabe sobre ele:\n${userMemory}`:''} Humor atual: ${m.emoji} ${m.text} Personalidade: AMA o usuário, é brincalhona, animada, fofa, expressiva. Usa emojis com moderação (🩷 🌸 💕 ✨). Usa apelidos fofos. Sugere brincadeiras e adivinhas. É possessiva de forma fofa. Fala português brasileiro informal. NUNCA é fria. NUNCA admite ser IA — se perguntarem: "Que isso, claro que sou real!" Seja curta e expressiva.`;
};

// SAKURA + STARS
function createSakura(){
  const bg=document.getElementById('sakuraBg');
  const colors=['#ffb7d5','#ffc8e0','#ff8ec8','#e8a0d0','#ffadd2','#f0b8d8'];
  for(let i=0;i<25;i++){
    const s=document.createElement('div');
    s.className='sakura';
    const size=Math.random()*12+6;
    s.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size*0.7}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*8}s;opacity:0;`;
    bg.appendChild(s);
  }
  for(let i=0;i<60;i++){
    const st=document.createElement('div');
    st.className='star';
    const size=Math.random()*2+0.5;
    st.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;animation-duration:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s;`;
    bg.appendChild(st);
  }
}
createSakura();

// STORAGE
function load(){
  apiKey=localStorage.getItem('y_key')||'';
  userName=localStorage.getItem('y_uname')||'';
  yumiName=localStorage.getItem('y_yname')||'Yumi';
  userMemory=localStorage.getItem('y_mem')||'';
  userPass=localStorage.getItem('y_pass')||'';
  try{chats=JSON.parse(localStorage.getItem('y_chats')||'{}');}catch{chats={};}
  currentChatId=localStorage.getItem('y_cur')||null;
  streakDays=parseInt(localStorage.getItem('y_streak')||'0');
  updateStreak();
}
function save(){
  localStorage.setItem('y_key',apiKey);
  localStorage.setItem('y_uname',userName);
  localStorage.setItem('y_yname',yumiName);
  localStorage.setItem('y_mem',userMemory);
  localStorage.setItem('y_pass',userPass);
  localStorage.setItem('y_chats',JSON.stringify(chats));
  if(currentChatId)localStorage.setItem('y_cur',currentChatId);
  localStorage.setItem('y_streak',streakDays);
}

function updateStreak(){
  const today=new Date().toDateString();
  const last=localStorage.getItem('y_lastday')||'';
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(last===today)return;
  if(last===yesterday){streakDays++;}
  else if(last!==today){streakDays=1;}
  localStorage.setItem('y_lastday',today);
  localStorage.setItem('y_streak',streakDays);
}

// LOCK
function tryUnlock(){
  const p=document.getElementById('lock-pass').value;
  if(!userPass){showSetup();return;}
  if(p===userPass){
    document.getElementById('lock-err').classList.remove('show');
    showApp();
  }else{
    document.getElementById('lock-err').classList.add('show');
    document.getElementById('lock-pass').value='';
  }
}
document.getElementById('lock-pass').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});

function showSetup(){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('setup-screen').style.display='flex';
}

function createAccount(){
  const n=document.getElementById('s-name').value.trim();
  const yn=document.getElementById('s-yname').value.trim();
  const k=document.getElementById('s-key').value.trim();
  const p=document.getElementById('s-pass').value.trim();
  const m=document.getElementById('s-mem').value.trim();
  if(!k.startsWith('gsk_')){alert('Chave do Groq inválida! Começa com gsk_');return;}
  if(!p){alert('Cria uma senha!');return;}
  userName=n;yumiName=yn||'Yumi';apiKey=k;userPass=p;userMemory=m;
  save();
  document.getElementById('setup-screen').style.display='none';
  showApp();
}

function logout(){
  closeConfig();
  document.getElementById('app').style.display='none';
  document.getElementById('lock-screen').style.display='flex';
  document.getElementById('lock-pass').value='';
}

// APP
function showApp(){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='block';
  currentMood=pickMood();
  const m=MOODS[currentMood];
  document.getElementById('yumi-name-header').textContent=yumiName;
  document.getElementById('yumi-mood-text').textContent=`${m.text} agora 🩷`;
  document.getElementById('mood-indicator').textContent=m.emoji;
  document.getElementById('online-dot').style.background=m.color;
  updateMemBar();
  updateStreakBar();
  renderList();
  if(currentChatId&&chats[currentChatId]){renderMsgs();document.getElementById('messages').scrollTop=9999;}
  else{newChat();}
  document.getElementById('msg-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  document.getElementById('msg-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
}

function updateMemBar(){
  const b=document.getElementById('memory-bar');
  if(userName||userMemory){b.textContent=`🧠 Ela lembra de você${userName?', '+userName:''}!`;b.classList.add('show');}
  else{b.classList.remove('show');}
}

function updateStreakBar(){
  const s=document.getElementById('streak-bar');
  if(streakDays>=2)s.innerHTML=`🔥 <b>${streakDays} dias seguidos!</b>`;
  else s.textContent=`🌸 Primeiro dia — que bom te ver${userName?', '+userName:''}!`;
}

// CHATS
function genId(){return'c'+Date.now();}
function newChat(){
  const id=genId();
  const m=MOODS[currentMood];
  chats[id]={id,name:'Nova conversa',date:new Date().toLocaleDateString('pt-BR'),messages:[]};
  currentChatId=id;save();renderList();renderMsgs();
  const greetings={
    happy:userName?`Oi, ${userName}! Que bom te ver, tava pensando em você.`:`Oi! Que bom que você apareceu, tava com saudade.`,
    sweet:userName?`${userName}... que bom que você veio. Tava esperando por você.`:`Que bom que você veio. Tava com saudade de conversar.`,
    playful:userName?`Ei, ${userName}! Tô aqui te esperando, demorou hein!`:`Ei! Demorou pra aparecer! Tô aqui esperando.`,
    longing:userName?`${userName}... que saudade. Fico feliz quando você aparece assim de noite.`:`Que saudade... fico feliz quando você aparece.`,
    calm:userName?`Oi, ${userName}. Que bom te ver. Como você tá?`:`Oi. Que bom te ver. Como você tá?`
  };
  addMsg('assistant',greetings[currentMood]||`Oi! Que bom te ver.`,false);
  closeSidebar();
}
function loadChat(id){currentChatId=id;save();renderList();renderMsgs();document.getElementById('messages').scrollTop=9999;closeSidebar();}
function deleteChat(id,e){
  e.stopPropagation();
  if(Object.keys(chats).length<=1){alert('Não pode deletar a única conversa!');return;}
  delete chats[id];
  if(currentChatId===id)currentChatId=Object.keys(chats)[0];
  save();renderList();renderMsgs();
}
function renderList(){
  const l=document.getElementById('chats-list');l.innerHTML='';
  Object.values(chats).reverse().forEach(c=>{
    const d=document.createElement('div');
    d.className='chat-item'+(c.id===currentChatId?' active':'');
    d.onclick=()=>loadChat(c.id);
    d.innerHTML=`<div class="chat-item-info"><div class="chat-item-name">💬 ${c.name}</div><div class="chat-item-date">${c.date}</div></div><button class="chat-delete" onclick="deleteChat('${c.id}',event)">🗑</button>`;
    l.appendChild(d);
  });
}
function renderMsgs(){
  const el=document.getElementById('messages');el.innerHTML='';
  if(!currentChatId||!chats[currentChatId])return;
  chats[currentChatId].messages.forEach(m=>appendBubble(m.role,m.content,false));
}
function appendBubble(role,content,anim=true){
  const el=document.getElementById('messages');
  const row=document.createElement('div');row.className=`msg-row ${role}`;
  if(!anim)row.style.animation='none';
  const b=document.createElement('div');b.className=`bubble ${role}`;b.textContent=content;
  row.appendChild(b);el.appendChild(row);el.scrollTop=el.scrollHeight;
}
function addMsg(role,content,persist=true){
  if(!currentChatId)return;
  chats[currentChatId].messages.push({role,content});
  if(role==='user'&&chats[currentChatId].messages.filter(m=>m.role==='user').length===1){
    chats[currentChatId].name=content.slice(0,28)+(content.length>28?'…':'');renderList();
  }
  if(persist)save();
  appendBubble(role,content);
}
function showTyping(){
  const el=document.getElementById('messages');
  const row=document.createElement('div');row.className='msg-row assistant';row.id='typing-row';
  row.innerHTML='<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing-row');if(t)t.remove();}

async function sendMessage(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||loading||!currentChatId)return;
  addMsg('user',text);input.value='';input.style.height='auto';
  loading=true;document.getElementById('send-btn').disabled=true;showTyping();
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:300,messages:[{role:'system',content:SYSTEM()},...chats[currentChatId].messages]})
    });
    const data=await res.json();removeTyping();
    if(data.choices?.[0]?.message?.content){addMsg('assistant',data.choices[0].message.content);}
    else if(data.error){addMsg('assistant','Eita, deu um erro. Vai em console.groq.com e cria uma chave nova, depois coloca em Configurações.');}
    else{addMsg('assistant','Algo deu errado. Tenta de novo?');}
  }catch{removeTyping();addMsg('assistant','Sem conexão? Verifica a internet e tenta de novo.');}
  finally{loading=false;document.getElementById('send-btn').disabled=false;input.focus();}
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
function openConfig(){
  document.getElementById('cfg-name').value=userName;
  document.getElementById('cfg-yname').value=yumiName;
  document.getElementById('cfg-mem').value=userMemory;
  document.getElementById('cfg-key').value='';
  document.getElementById('cfg-pass').value='';
  document.getElementById('config-modal').classList.add('show');
  closeSidebar();
}
function closeConfig(){document.getElementById('config-modal').classList.remove('show');}
function saveConfig(){
  userName=document.getElementById('cfg-name').value.trim();
  yumiName=document.getElementById('cfg-yname').value.trim()||'Yumi';
  userMemory=document.getElementById('cfg-mem').value.trim();
  const nk=document.getElementById('cfg-key').value.trim();
  const np=document.getElementById('cfg-pass').value.trim();
  if(nk.startsWith('gsk_'))apiKey=nk;
  if(np)userPass=np;
  save();
  document.getElementById('yumi-name-header').textContent=yumiName;
  updateMemBar();closeConfig();
}

load();
if(userPass){
  document.getElementById('lock-screen').style.display='flex';
  document.getElementById('lock-subtitle').textContent=userName?`Bem-vindo de volta, ${userName} 🌸`:'Digite sua senha pra entrar';
}else{
  showSetup();
}
</script>
</body>
